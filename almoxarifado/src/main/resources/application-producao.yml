spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${ALMOXARIFADO_DB_USER_PROD}
    password: ${ALMOXARIFADO_DB_PASSWORD_PROD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: almoxarifado-pool-prod
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000
      leak-detection-threshold: 60000

  flyway:
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
