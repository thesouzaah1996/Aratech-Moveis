spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5555/almoxarifado-dev}
    username: ${ALMOXARIFADO_DB_USER_DEV:postgres}
    password: ${ALMOXARIFADO_DB_PASSWORD_DEV:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: almoxarifado-pool-dev
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000

  flyway:
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
