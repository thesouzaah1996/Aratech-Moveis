<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fila de Recebimento • Araplac</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/dashboard.css">
    <link rel="stylesheet" href="./css/aguardando-descarga.css">
</head>

<body>

    <header class="app-header">
        <div class="container-fluid header-row">
            <a href="dashboard.html" class="brand d-flex align-items-center gap-3">
            </a>

            <div class="session ms-auto">
                <div class="dropdown">
                    <button class="btn-profile dropdown-toggle" type="button" id="profileDropdown"
                        data-bs-toggle="dropdown" aria-expanded="false">
                        <div class="profile-avatar">
                            <i class="bi bi-person-circle"></i>
                        </div>
                        <span>Usuário</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="profileDropdown">
                        <li>
                            <a class="dropdown-item" href="#">
                                <i class="bi bi-person me-2"></i>
                                Meu Perfil
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item" href="#">
                                <i class="bi bi-gear me-2"></i>
                                Configurações
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item" href="#">
                                <i class="bi bi-shield-check me-2"></i>
                                Privacidade
                            </a>
                        </li>
                        <li>
                            <hr class="dropdown-divider">
                        </li>
                        <li>
                            <button class="dropdown-item text-danger" type="button" data-bs-toggle="modal"
                                data-bs-target="#logoutModal">
                                <i class="bi bi-box-arrow-right me-2"></i>
                                Sair
                            </button>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </header>

    <main class="app-main">
        <div class="container app-breadcrumb">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="dashboard.html">Início</a></li>
                    <li class="breadcrumb-item"><a href="almoxarifado.html">Almoxarifado</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Aguardando Descarga</li>
                </ol>
            </nav>
        </div>
        <div class="container py-5">

            <!-- BOTÃO HISTÓRICO -->
            <div class="d-flex justify-content-end mb-4">
                <button class="btn btn-danger px-4" data-bs-toggle="modal" data-bs-target="#historicoModal">
                    <i class="bi bi-clock-history me-2"></i>
                    Histórico de Itens Recebidos
                </button>
            </div>

            <div class="card shadow-sm mb-5">
                <div class="card-body">
                    <table class="table table-hover align-middle">
                        <thead>
                            <tr>
                                <th>Empresa</th>
                                <th>Produto</th>
                                <th>Chegada</th>
                                <th>Motorista</th>
                                <th>Status</th>
                                <th class="text-end">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="filaTable"></tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <!-- MODAL HISTÓRICO -->
    <div class="modal fade" id="historicoModal" tabindex="-1">
        <div class="modal-dialog modal-xl modal-dialog-scrollable">
            <div class="modal-content">

                <div class="modal-header bg-danger text-white">
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <div class="table-responsive">
                        <table class="table table-striped table-hover align-middle">
                            <thead class="table-dark">
                                <tr>
                                    <th>Empresa</th>
                                    <th>Produto</th>
                                    <th>Motorista</th>
                                    <th>Data Finalização</th>
                                    <th>Status</th>
                                    <th>Observações</th>
                                </tr>
                            </thead>
                            <tbody id="historicoTableBody"></tbody>
                        </table>
                    </div>

                    <div id="historicoEmptyMessage" class="text-center text-muted py-4" style="display:none;">
                        Nenhum item finalizado ainda.
                    </div>

                </div>

                <div class="modal-footer border-0 bg-light">
                    <button class="btn btn-danger px-4" data-bs-dismiss="modal">
                        <i class="bi bi-x me-1"></i>
                        Fechar
                    </button>
                </div>

            </div>
        </div>
    </div>

    <!-- MODAIS EXISTENTES (não alterados) -->
    <div class="modal fade" id="finalizarModal" tabindex="-1">...</div>
    <div class="modal fade" id="liberarModal" tabindex="-1">...</div>

    <footer class="app-footer">
        <div class="container text-center">
            © 2025 Araplac Móveis — Almoxarifado
        </div>
    </footer>

    <div id="alertContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/aguardando-descarga.js"></script>

</body>

</html>
