volumes:
  almoxarifado-db-prod-data:
  login-db-prod-data:
  portaria-db-prod-data:

services:

  aratech-frontend:
    build: ./aratechFrontend/aratech-movies-frontend
    image: aratech/frontend:latest
    container_name: aratech-frontend
    restart: always
    ports:
      - "80:80"
    networks:
      - aratech-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

  almoxarifado-db:
    container_name: almoxarifado-db-prod
    ports:
      - "5575:5432"
    environment:
      POSTGRES_USER: ${ALMOXARIFADO_DB_USER_PROD}
      POSTGRES_PASSWORD: ${ALMOXARIFADO_DB_PASSWORD_PROD}
      POSTGRES_DB: almoxarifado-prod
    command: >
      postgres
      -c shared_buffers=128MB
      -c work_mem=8MB
      -c maintenance_work_mem=64MB
      -c max_connections=50
    volumes:
      - almoxarifado-db-prod-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  login-db:
    container_name: login-db-prod
    ports:
      - "5576:5432"
    environment:
      POSTGRES_USER: ${LOGIN_DB_USER_PROD}
      POSTGRES_PASSWORD: ${LOGIN_DB_PASSWORD_PROD}
      POSTGRES_DB: login-prod
    command: >
      postgres
      -c shared_buffers=128MB
      -c work_mem=8MB
      -c maintenance_work_mem=64MB
      -c max_connections=50
    volumes:
      - login-db-prod-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  portaria-db:
    container_name: portaria-db-prod
    ports:
      - "5577:5432"
    environment:
      POSTGRES_USER: ${PORTARIA_DB_USER_PROD}
      POSTGRES_PASSWORD: ${PORTARIA_DB_PASSWORD_PROD}
      POSTGRES_DB: portaria-prod
    command: >
      postgres
      -c shared_buffers=128MB
      -c work_mem=8MB
      -c maintenance_work_mem=64MB
      -c max_connections=50
    volumes:
      - portaria-db-prod-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  almoxarifado:
    container_name: almoxarifado
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: producao
      SPRING_DATASOURCE_URL: jdbc:postgresql://almoxarifado-db:5432/almoxarifado-prod
      ALMOXARIFADO_DB_USER_PROD: ${ALMOXARIFADO_DB_USER_PROD}
      ALMOXARIFADO_DB_PASSWORD_PROD: ${ALMOXARIFADO_DB_PASSWORD_PROD}
      JAVA_TOOL_OPTIONS: "-Xms256m -Xmx512m -XX:MaxMetaspaceSize=128m"
    deploy:
      resources:
        limits:
          cpus: '1.0'


          memory: 768M

  login:
    container_name: login
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: producao
      SPRING_DATASOURCE_URL: jdbc:postgresql://login-db:5432/login-prod
      LOGIN_DB_USER_PROD: ${LOGIN_DB_USER_PROD}
      LOGIN_DB_PASSWORD_PROD: ${LOGIN_DB_PASSWORD_PROD}
      JAVA_TOOL_OPTIONS: "-Xms256m -Xmx512m -XX:MaxMetaspaceSize=128m"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M

  portaria:
    container_name: portaria
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: producao
      SPRING_DATASOURCE_URL: jdbc:postgresql://portaria-db:5432/portaria-prod
      PORTARIA_DB_USER_PROD: ${PORTARIA_DB_USER_PROD}
      PORTARIA_DB_PASSWORD_PROD: ${PORTARIA_DB_PASSWORD_PROD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JAVA_TOOL_OPTIONS: "-Xms256m -Xmx512m -XX:MaxMetaspaceSize=128m"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M

  zookeeper:
    environment:
      JVMFLAGS: "-Xmx256m -Xms128m"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  kafka:
    environment:
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
