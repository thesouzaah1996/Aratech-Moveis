spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5556/login-dev}
    username: ${LOGIN_DB_USER_DEV:postgres}
    password: ${LOGIN_DB_PASSWORD_DEV:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: login-pool-dev
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
