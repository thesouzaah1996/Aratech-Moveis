<app-navbar />

<main class="app-main">
  <app-breadcrumb [items]="breadcrumb" />
  <div class="container py-5">
    <div class="row g-4 justify-content-center">

      <div class="col-md-6 col-lg-5">
        <a routerLink="/compras/pedidos" class="card card-menu h-100">
          <div class="d-flex flex-column align-items-center justify-content-center h-100">
            <i class="bi bi-cart-check icon-size"></i>
            <h4 class="fw-bold mb-2">Pedidos de Compra</h4>
            <p class="text-muted text-center mb-0">Emissão e acompanhamento de pedidos a fornecedores</p>
          </div>
        </a>
      </div>

      <div class="col-md-6 col-lg-5">
        <a routerLink="/compras/cotacoes" class="card card-menu h-100">
          <div class="d-flex flex-column align-items-center justify-content-center h-100">
            <i class="bi bi-currency-dollar icon-size"></i>
            <h4 class="fw-bold mb-2">Cotações</h4>
            <p class="text-muted text-center mb-0">Comparação de preços e seleção de fornecedores</p>
          </div>
        </a>
      </div>

      <div class="col-md-6 col-lg-5">
        <a routerLink="/compras/aprovacoes" class="card card-menu h-100">
          <div class="d-flex flex-column align-items-center justify-content-center h-100">
            <i class="bi bi-check2-square icon-size"></i>
            <h4 class="fw-bold mb-2">Aprovações</h4>
            <p class="text-muted text-center mb-0">Pedidos aguardando autorização para emissão</p>
          </div>
        </a>
      </div>

    </div>
  </div>
</main>

<app-footer />
