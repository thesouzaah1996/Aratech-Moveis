<header class="app-header">
  <div class="container-fluid header-row">
    <a routerLink="/dashboard" class="brand d-flex align-items-center gap-3">
      <img src="/img/aratech-logo-dashboard.png" alt="Aratech Móveis" class="brand-logo" />
    </a>

    <div class="session ms-auto">
      <div class="dropdown">
        <button class="btn-profile dropdown-toggle" type="button" id="profileDropdown"
          data-bs-toggle="dropdown" aria-expanded="false">
          <div class="profile-info">
            <div class="profile-avatar">
              <i class="bi bi-person-circle"></i>
            </div>
            <span>Usuário</span>
          </div>
        </button>
        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="profileDropdown">
          <li>
            <a class="dropdown-item" href="#">
              <i class="bi bi-person me-2"></i>
              Meu Perfil
            </a>
          </li>
          <li>
            <a class="dropdown-item" href="#">
              <i class="bi bi-gear me-2"></i>
              Configurações
            </a>
          </li>
          <li>
            <a class="dropdown-item" href="#">
              <i class="bi bi-shield-check me-2"></i>
              Privacidade
            </a>
          </li>
          <li>
            <hr class="dropdown-divider">
          </li>
          <li>
            <button class="dropdown-item text-danger" type="button" data-bs-toggle="modal"
              data-bs-target="#logoutModal">
              <i class="bi bi-box-arrow-right me-2"></i>
              Sair
            </button>
          </li>
        </ul>
      </div>
    </div>
  </div>
</header>

<div class="modal fade" id="logoutModal" #logoutModal tabindex="-1" aria-labelledby="logoutModalLabel" data-bs-backdrop="static" data-bs-keyboard="false">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header border-0">
        <div class="modal-icon">
          <i class="bi bi-question-circle text-warning"></i>
        </div>
        <h5 class="modal-title ms-2" id="logoutModalLabel">Confirmar Saída</h5>
      </div>
      <div class="modal-body py-4">
        <p class="mb-0">Tem certeza que deseja sair do sistema?</p>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-cancelar" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-danger" (click)="performLogout()">
          <i class="bi bi-box-arrow-right me-2"></i>Sair
        </button>
      </div>
    </div>
  </div>
</div>
