<app-navbar />

<main class="app-main">
  <app-breadcrumb [items]="breadcrumb" />
  <div class="container py-5">
    <div class="row g-4 justify-content-center">

      <div class="col-md-6 col-lg-5">
        <a routerLink="/almoxarifado/estoque-produtos" class="card card-menu h-100">
          <div class="d-flex flex-column align-items-center justify-content-center h-100">
            <i class="bi bi-clipboard-data icon-size"></i>
            <h4 class="fw-bold mb-2">Estoque de Produtos</h4>
            <p class="text-muted text-center mb-0">Saldos, lotes e localização</p>
          </div>
        </a>
      </div>

      <div class="col-md-6 col-lg-5">
        <a routerLink="/almoxarifado/categorias" class="card card-menu h-100">
          <div class="d-flex flex-column align-items-center justify-content-center h-100">
            <i class="bi bi-grid icon-size"></i>
            <h4 class="fw-bold mb-2">Categorias</h4>
            <p class="text-muted text-center mb-0">Adicionar, remover, editar e listar categorias</p>
          </div>
        </a>
      </div>

      <div class="col-md-6 col-lg-5">
        <a routerLink="/almoxarifado/fornecedores" class="card card-menu h-100">
          <div class="d-flex flex-column align-items-center justify-content-center h-100">
            <i class="bi bi-building icon-size"></i>
            <h4 class="fw-bold mb-2">Fornecedores</h4>
            <p class="text-muted text-center mb-0">Parceiros, contratos e cadastro</p>
          </div>
        </a>
      </div>

      <div class="col-md-6 col-lg-5">
        <a routerLink="/almoxarifado/aguardando-descarga" class="card card-menu h-100">
          <div class="d-flex flex-column align-items-center justify-content-center h-100">
            <i class="bi bi-truck icon-size"></i>
            <h4 class="fw-bold mb-2">Aguardando Descarga</h4>
            <p class="text-muted text-center mb-0">Caminhões aguardando liberação para conferência e descarga</p>
          </div>
        </a>
      </div>

    </div>
  </div>
</main>

<app-footer />
