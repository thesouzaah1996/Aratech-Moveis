<app-navbar />

<main class="app-main">
  <app-breadcrumb [items]="breadcrumb" />
  <div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
      <h3 class="fw-bold mb-0">Permissão de Acesso</h3>
    </div>

    <div class="card shadow-sm mb-4">
      <div class="card-body p-4">
        <div class="row g-3 align-items-end">
          <div class="col-md-5">
            <label class="form-label fw-semibold">Nome completo</label>
            <input type="text" class="form-control" placeholder="Ex: João Silva"
              [(ngModel)]="buscaNome">
          </div>
          <div class="col-md-5">
            <label class="form-label fw-semibold">E-mail</label>
            <input type="email" class="form-control" placeholder="Ex: joao@empresa.com"
              [(ngModel)]="buscaEmail">
          </div>
          <div class="col-md-2">
            <button class="btn btn-danger w-100" disabled>
              <i class="bi bi-search me-1"></i>Buscar
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="card shadow-sm">
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-hover align-middle">
            <thead>
              <tr>
                <th>Nome</th>
                <th>E-mail</th>
                <th>Perfil</th>
                <th>Status</th>
                <th class="text-end">Ações</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td colspan="5">
                  <div class="empty-state">
                    <i class="bi bi-shield-lock"></i>
                    <p>Busque um usuário pelo nome ou e-mail para ver os resultados.</p>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</main>

<app-footer />
