<app-navbar />

<main class="app-main">
  <app-breadcrumb [items]="breadcrumb" />
  <div class="container py-5">
    <div class="row g-4 justify-content-center">

      <div class="col-md-6 col-lg-5">
        <a routerLink="/suporte/chamado-ti" class="card card-menu h-100">
          <div class="d-flex flex-column align-items-center justify-content-center h-100">
            <i class="bi bi-headset icon-size"></i>
            <h4 class="fw-bold mb-2">Abrir Chamado</h4>
            <p class="text-muted text-center mb-0">Registre uma solicitação para a equipe de suporte técnico</p>
          </div>
        </a>
      </div>

      <div class="col-md-6 col-lg-5">
        <a routerLink="/suporte/acompanhamento" class="card card-menu h-100">
          <div class="d-flex flex-column align-items-center justify-content-center h-100">
            <i class="bi bi-clipboard-check icon-size"></i>
            <h4 class="fw-bold mb-2">Acompanhamento</h4>
            <p class="text-muted text-center mb-0">Consulte o status e histórico dos seus chamados de TI</p>
          </div>
        </a>
      </div>

    </div>
  </div>
</main>

<app-footer />
