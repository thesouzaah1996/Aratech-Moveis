# Nunca suba esse arquivo sozinho. Sempre use junto com um override:
#   docker compose -f docker-compose.yml -f docker-compose-dev.yml up -d
#   docker compose -f docker-compose.yml -f docker-compose-prod.yml up -d

networks:
  aratech-network:
    driver: bridge

services:

  almoxarifado-db:
    image: postgres:17.4
    restart: always
    networks:
      - aratech-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  login-db:
    image: postgres:17.4
    restart: always
    networks:
      - aratech-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  portaria-db:
    image: postgres:17.4
    restart: always
    networks:
      - aratech-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  almoxarifado:
    build: ./almoxarifado
    image: aratech/almoxarifado:latest
    restart: always
    depends_on:
      almoxarifado-db:
        condition: service_healthy
    networks:
      - aratech-network

  login:
    build: ./login
    image: aratech/login:latest
    restart: always
    depends_on:
      login-db:
        condition: service_healthy
    networks:
      - aratech-network

  portaria:
    build: ./portaria
    image: aratech/portaria:latest
    restart: always
    depends_on:
      portaria-db:
        condition: service_healthy
    networks:
      - aratech-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.2.15
    container_name: zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      JVMFLAGS: "-Xmx128m -Xms64m"
    ports:
      - "22181:2181"
    networks:
      - aratech-network
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M

  kafka:
    image: confluentinc/cp-kafka:7.2.15
    container_name: kafka
    restart: always
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms128m"
    ports:
      - "29092:29092"
    networks:
      - aratech-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    restart: always
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      JAVA_TOOL_OPTIONS: "-Xmx128m -Xms64m"
    ports:
      - "8090:8080"
    networks:
      - aratech-network
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M
