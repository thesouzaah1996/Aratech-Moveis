spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/recursoshumanos}
    username: ${RH_DB_USER_DEV:postgres}
    password: ${RH_DB_PASSWORD_DEV:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: recursoshumanos-pool-dev
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
